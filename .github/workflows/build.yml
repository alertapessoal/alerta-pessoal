name: EAS Build Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Criar google-services.json
        env:
          GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES" ]; then
            echo "ERRO: Secret GOOGLE_SERVICES_JSON nao foi configurado no GitHub!"
            exit 1
          fi
          echo "$GOOGLE_SERVICES" > google-services.json
          echo "Arquivo criado:"
          ls -la google-services.json

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Garantir expo-secure-store instalado
        run: npm install expo-secure-store --legacy-peer-deps

      - name: Expo Prebuild (gerar projeto Android nativo)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: "1"

      - name: Build APK com Gradle
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Salvar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-preview
          path: android/app/build/outputs/apk/release/app-release.apk
